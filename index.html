    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            padding: 128px ;
            box-sizing: border-box;
            font-size: 18px;
            line-height: 1.8;
            font-family: -apple-system, BlinkMacSystemFont, Inter, "Hiragino Kaku Gothic Pro", "Noto Sans JP", "BIZ UDPGothic", sans-serif;
            color: #000;
            outline: none;
            resize: none;
        }

        @media (max-width: 600px) {
            textarea {
                padding: 48px 48px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <textarea id="memo" placeholder="文字を入力..."></textarea>

    <script>
        const memoArea = document.getElementById('memo');

        memoArea.value = localStorage.getItem('ultra_minimal_memo') || '';

        memoArea.addEventListener('input', () => {
            localStorage.setItem('ultra_minimal_memo', memoArea.value);
        });
    </script>
</body>
